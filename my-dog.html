<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반려견 번역기</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<style>
:root { --bg: #fdfaf6; --accent: #7c4dff; --text: #2d3436; }

body {
    font-family: 'Pretendard', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    padding: 20px;
    color: var(--text);
}

.container {
    max-width: 400px;
    width: 100%;
    background: white;
    border-radius: 24px;
    padding: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.05);
}

.header { text-align: center; margin-bottom: 20px; }

.translate-card {
    border: 2px solid #f0f0f0;
    border-radius: 15px;
    padding: 20px;
    transition: 0.3s;
}

.translate-card.active {
    border-color: var(--accent);
    background: #f9f7ff;
}

.mic-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    display: block;
    margin: 0 auto 10px;
}

.status-text {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
    color: var(--accent);
}
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <h2>🐾 AI 번역 모드</h2>
        <p>실시간 소리 분석</p>
    </div>

    <div class="translate-card" id="card">
        <button class="mic-btn" id="mic">🎤</button>
        <div class="status-text" id="status">버튼을 눌러 시작</div>

        <h3 id="result">---</h3>
        <p id="desc">소리를 분석하면 결과가 나옵니다</p>
    </div>
</div>

<script>
let audioContext;
let analyser;
let micStream;
let dataArray;
let isRunning = false;

const micBtn = document.getElementById("mic");

micBtn.onclick = async () => {
    if (!isRunning) {
        startMic();
    } else {
        stopMic();
    }
};

async function startMic() {
    document.getElementById("status").innerText = "🎧 듣는 중...";
    document.getElementById("card").classList.add("active");

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioContext = new AudioContext();
    analyser = audioContext.createAnalyser();
    micStream = audioContext.createMediaStreamSource(stream);

    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    micStream.connect(analyser);

    isRunning = true;
    analyze();
}

function stopMic() {
    isRunning = false;
    document.getElementById("status").innerText = "분석 완료";
    document.getElementById("card").classList.remove("active");
}

function analyze() {
    if (!isRunning) return;

    analyser.getByteFrequencyData(dataArray);

    let sum = 0;
    let maxIndex = 0;
    let maxValue = 0;

    for (let i = 0; i < dataArray.length; i++) {
        sum += dataArray[i];

        if (dataArray[i] > maxValue) {
            maxValue = dataArray[i];
            maxIndex = i;
        }
    }

    let avg = sum / dataArray.length;

    // 🎯 주파수 추정
    let frequency = maxIndex * (audioContext.sampleRate / analyser.fftSize);

    let result = "";
    let desc = "";

    if (avg > 60 && frequency > 1000) {
        result = "🐶 신남 / 반가움";
        desc = "높고 큰 소리 → 강한 흥분 상태";
    } 
    else if (frequency < 300 && avg > 40) {
        result = "⚠️ 경계 / 위협";
        desc = "낮고 강한 소리 → 경계 상태";
    } 
    else if (frequency > 800 && avg < 40) {
        result = "😮 놀람 / 불안";
        desc = "높지만 약한 소리 → 긴장 상태";
    } 
    else if (avg < 20) {
        result = "😐 안정 상태";
        desc = "조용하고 안정됨";
    } 
    else {
        result = "👀 관찰 중";
        desc = "환경을 인식하고 있음";
    }

    document.getElementById("result").innerText = result;
    document.getElementById("desc").innerText = desc;

    requestAnimationFrame(analyze);
}
</script>

</body>
</html>
