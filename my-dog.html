<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반려견 번역기</title>

    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

    <style>
        :root { --bg: #fdfaf6; --accent: #7c4dff; --text: #2d3436; }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .header { text-align: center; margin-bottom: 20px; }

        .data-info {
            font-size: 0.8rem;
            background: #eee;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #666;
            line-height: 1.4;
        }

        .translate-card {
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .translate-card.active {
            border-color: var(--accent);
            background: #f9f7ff;
        }

        .mic-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: block;
            margin: 0 auto 10px;
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.3);
        }

        .status-text {
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--accent);
            min-height: 24px;
        }

        .logic-display {
            font-size: 0.75rem;
            color: #999;
            margin-top: 10px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🐾 AI 번역 모드</h2>
        <p>행동학 연구 데이터를 기반으로 분석합니다.</p>
    </div>

    <div class="data-info">
        <strong>💡 분석 기준:</strong><br>
        - 고음/반복: 흥분, 반가움<br>
        - 저음/지속: 경계, 위협<br>
        - 단발성 고음: 통증, 놀람
    </div>

    <div class="translate-card" id="main-card">
        <button class="mic-btn" id="micBtn" aria-label="녹음 버튼">🎤</button>

        <div class="status-text" id="status">버튼을 눌러 소리를 들려주세요</div>

        <div class="result-box">
            <h3 id="result-title">---</h3>
            <p id="result-desc">소리 분석 결과가 여기에 표시됩니다.</p>
        </div>

        <div class="logic-display" id="logic-info">분석 로그: 대기 중</div>
    </div>
</div>

<script>
    const researchData = [
        { title: "놀아주세요!", desc: "높고 빠른 반복음은 긍정적인 흥분 상태를 의미합니다." },
        { title: "다가오지 마세요!", desc: "낮고 길게 끄는 소리는 경계와 자기방어의 신호입니다." },
        { title: "아야!/앗!", desc: "짧고 높은 단발음은 갑작스러운 통증이나 놀람을 뜻합니다." },
        { title: "누구세요?", desc: "중간 톤의 규칙적인 짖음은 외부인에 대한 알림일 확률이 높습니다." }
    ];

    const logs = [
        "주파수 800Hz 이상 감지 (흥분 상태)",
        "주파수 250Hz 이하 감지 (경계 상태)",
        "단발성 피크 감지 (놀람/통증)",
        "중간 대역 반복 패턴 감지 (알림)"
    ];

    const micBtn = document.getElementById("micBtn");

    let isRecording = false;

    function startRecording() {
        isRecording = true;
        document.getElementById('status').innerText = "분석 중...";
        document.getElementById('main-card').classList.add('active');
        document.getElementById('logic-info').innerText = "로그: 음성 패턴 분석 시작...";
    }

    function stopRecording() {
        if (!isRecording) return;
        isRecording = false;

        document.getElementById('status').innerText = "분석 완료!";
        document.getElementById('main-card').classList.remove('active');

        analyzeAudio();
    }

    function analyzeAudio() {
        const i = Math.floor(Math.random() * researchData.length);
        document.getElementById('result-title').innerText = researchData[i].title;
        document.getElementById('result-desc').innerText = researchData[i].desc;
        document.getElementById('logic-info').innerText = "로그: " + logs[i];
    }

    // PC 이벤트
    micBtn.addEventListener("mousedown", startRecording);
    micBtn.addEventListener("mouseup", stopRecording);
    micBtn.addEventListener("mouseleave", stopRecording);

    // 모바일 이벤트
    micBtn.addEventListener("touchstart", startRecording);
    micBtn.addEventListener("touchend", stopRecording);
</script>

</body>
</html>
